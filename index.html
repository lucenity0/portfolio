<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>me.lucenity.dev — under construction</title>
<meta name="description" content="Nafees S (lucenity0) is building something here. The cat's just keeping the seat warm." />
<meta name="color-scheme" content="dark" />
<meta property="og:title" content="me.lucenity.dev — under construction" />
<meta property="og:description" content="Something's being built here. Meanwhile, the cat naps." />

<style>
  :root {
    --bg:        #0d0d0d;
    --panel:     #111111;
    --line:      #262626;
    --ink:       #f4f4f4;
    --dim:       #9a9a9a;
    --sub:       #6a6a6a;
    --mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(16px, 4vw, 40px);
    overflow-x: hidden;
  }

  /* faint grid + vignette behind everything */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: .35;
    -webkit-mask-image: radial-gradient(120% 90% at 50% 40%, #000 40%, transparent 100%);
            mask-image: radial-gradient(120% 90% at 50% 40%, #000 40%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  main {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 760px;
  }

  .frame {
    border: 3px solid var(--ink);
    border-radius: 16px;
    background: linear-gradient(180deg, #0f0f0f, #0a0a0a);
    padding: clamp(14px, 3vw, 26px);
    position: relative;
    box-shadow: 0 0 0 6px #000, 0 30px 80px -30px #000;
  }
  /* corner brackets */
  .frame::before, .frame::after {
    content: ""; position: absolute; width: 16px; height: 16px; pointer-events: none;
    border-color: var(--dim); border-style: solid;
  }
  .frame::before { top: 8px;  left: 8px;  border-width: 2px 0 0 2px; }
  .frame::after  { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
    font-size: 11px; letter-spacing: 2px; color: var(--dim);
    margin-bottom: 14px;
  }
  .topbar .status { display: inline-flex; align-items: center; gap: 8px; }
  .blip {
    width: 8px; height: 8px; background: var(--ink); display: inline-block;
    box-shadow: 0 0 0 0 var(--ink);
  }

  .stage {
    position: relative;
    border: 2px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    background: #060606;
    aspect-ratio: 160 / 90;
  }
  canvas {
    display: block;
    width: 100%; height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  /* CRT scanlines + soft glow, on top of canvas */
  .stage::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background:
      repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.28) 2px 3px),
      radial-gradient(120% 120% at 50% 30%, transparent 55%, rgba(0,0,0,.55) 100%);
    mix-blend-mode: multiply;
  }

  .headline {
    margin: 20px 2px 0;
    font-size: clamp(20px, 6vw, 40px);
    font-weight: 800;
    letter-spacing: clamp(2px, 1.2vw, 8px);
    line-height: 1;
    display: flex; align-items: baseline; flex-wrap: wrap; gap: 0 .35em;
  }
  .headline .caret {
    display: inline-block; width: .55em; height: .95em;
    background: var(--ink); transform: translateY(.06em);
  }
  .sub {
    margin: 12px 2px 0;
    color: var(--dim);
    font-size: clamp(12px, 2.6vw, 14px);
    line-height: 1.5;
    max-width: 52ch;
  }

  /* loading bar */
  .load { margin: 20px 2px 4px; }
  .load .meta {
    display: flex; justify-content: space-between; gap: 10px;
    font-size: 11px; letter-spacing: 1px; color: var(--sub);
    margin-bottom: 7px;
  }
  .bar {
    height: 14px;
    padding: 3px;
    border: 2px solid var(--line);
    border-radius: 4px;
    background:
      repeating-linear-gradient(90deg, transparent 0 8px, rgba(255,255,255,.04) 8px 9px);
  }
  .bar > i {
    display: block; height: 100%;
    background:
      repeating-linear-gradient(90deg, var(--ink) 0 6px, #000 6px 7px);
    width: 12%;
  }

  footer {
    margin-top: 22px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
    font-size: 11px; letter-spacing: 1px; color: var(--sub);
  }
  footer a { color: var(--dim); text-decoration: none; border-bottom: 1px solid var(--line); }
  footer a:hover { color: var(--ink); border-color: var(--dim); }

  @media (prefers-reduced-motion: no-preference) {
    .blip { animation: blip 1.8s ease-in-out infinite; }
    .caret { animation: caret 1s steps(1) infinite; }
    .bar > i { animation: load 6.5s cubic-bezier(.5,.1,.3,1) infinite; }
  }
  @keyframes blip {
    0%,100% { box-shadow: 0 0 0 0 rgba(244,244,244,.6); opacity: 1; }
    50%     { box-shadow: 0 0 0 5px rgba(244,244,244,0);  opacity: .55; }
  }
  @keyframes caret { 0%,49% { opacity: 1 } 50%,100% { opacity: 0 } }
  @keyframes load {
    0%   { width: 8%; }
    55%  { width: 68%; }
    70%  { width: 71%; }
    100% { width: 74%; }
  }
</style>

<main>
  <div class="frame">
    <div class="topbar">
      <span>// me.lucenity.dev</span>
      <span class="status"><i class="blip"></i>STATUS: UNDER CONSTRUCTION</span>
    </div>

    <div class="stage">
      <canvas id="scene" width="160" height="90" aria-label="Pixel-art night construction site with a sleeping cat"></canvas>
    </div>

    <h1 class="headline">UNDER CONSTRUCTION<span class="caret"></span></h1>
    <p class="sub" id="sub">
      something's being built here — the cat's just keeping the seat warm.
      check back soon.
    </p>

    <div class="load">
      <div class="meta"><span id="loadmsg">laying pixel bricks…</span><span>WIP</span></div>
      <div class="bar"><i></i></div>
    </div>

    <footer>
      <span>© 2026 · NAFEES S · he/him</span>
      <span><a href="https://github.com/lucenity0">github.com/lucenity0</a></span>
    </footer>
  </div>
</main>

<script>
(() => {
  const cv = document.getElementById('scene');
  const g  = cv.getContext('2d');
  const VW = cv.width, VH = cv.height;      // 160 x 90 virtual pixels
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---- monochrome palette (pure greys) --------------------------------
  const C = {
    sky0:'#0a0a0a', sky1:'#121212', ground:'#151515', groundLine:'#2b2b2b',
    far:'#3a3a3a', mid:'#5c5c5c', dim:'#8f8f8f', body:'#cfcfcf',
    light:'#e8e8e8', bright:'#f6f6f6', shadow:'#0d0d0d'
  };
  const px = (x,y,w,h,c) => { g.fillStyle = c; g.fillRect(x|0, y|0, w|0, h|0); };

  // ---- sprite helper: draw a string bitmap -----------------------------
  // map: chars -> colour (space/'.' = transparent)
  function sprite(rows, ox, oy, map, flip=false) {
    for (let r = 0; r < rows.length; r++) {
      const line = rows[r];
      for (let c = 0; c < line.length; c++) {
        const col = map[line[c]];
        if (!col) continue;
        const x = flip ? ox + (line.length - 1 - c) : ox + c;
        px(x, oy + r, 1, 1, col);
      }
    }
  }

  // ---- sleeping cat: head up-left, body lying to the right -------------
  // # body   o outline/shade   - closed eye   . transparent   (tail is procedural)
  const CAT = [
    "..#....#......................",
    "..##..##......................",
    ".####.####....................",
    ".##########...................",
    "############..................",
    "###--#######..................",
    "############..................",
    "#############.................",
    "#########################.....",
    "#########################.....",
    "#########################.....",
    ".#######################......",
    ".######################.......",
    "..###################.........",
    "...oooooooooooooooo...........",
  ];
  const CATMAP = { '#':C.body, 'o':C.dim, '-':C.shadow };
  // tail curl (procedural): points relative to cat origin, swept up-right
  const TAIL = [[23,10],[25,9],[27,7],[28,5],[27,3],[25,2],[23,2]];

  // ---- little "Z" glyph (3x5) ------------------------------------------
  const Z = ["###","..#",".#.","#..","###"];
  function drawZ(cx, cy, s, alpha) {
    g.globalAlpha = alpha;
    for (let r=0;r<5;r++) for (let c=0;c<3;c++) if (Z[r][c]==='#') px(cx+c*s, cy+r*s, s, s, C.light);
    g.globalAlpha = 1;
  }

  // ---- static star field ------------------------------------------------
  const stars = [];
  (function seed(){
    let s = 1337;
    const rnd = () => (s = (s*1103515245 + 12345) & 0x7fffffff) / 0x7fffffff;
    for (let i=0;i<34;i++){
      const x = 4 + Math.floor(rnd()*(VW-8));
      const y = 3 + Math.floor(rnd()*44);
      if (x>112 && x<150 && y<26) continue;      // keep clear of the moon
      stars.push({x, y, ph: rnd()*Math.PI*2, sp: .6+rnd()*1.6, big: rnd()>.86});
    }
  })();

  const GROUND_Y = 70;   // horizon line

  function draw(t){
    // sky
    px(0,0,VW,VH,C.sky1);
    px(0,0,VW,42,C.sky0);

    // stars (twinkle)
    for (const st of stars){
      const tw = reduce ? .8 : (0.45 + 0.55*Math.sin(t*0.002*st.sp + st.ph));
      if (tw < 0.28) continue;
      const col = tw > 0.8 ? C.bright : (tw > 0.55 ? C.light : C.mid);
      px(st.x, st.y, 1, 1, col);
      if (st.big && tw > 0.7){ px(st.x-1,st.y,1,1,C.mid); px(st.x+1,st.y,1,1,C.mid); px(st.x,st.y-1,1,1,C.mid); px(st.x,st.y+1,1,1,C.mid); }
    }

    // crescent moon (top-right)
    const mx=132, my=15, mr=8;
    g.fillStyle = C.dim;
    g.beginPath(); g.arc(mx,my,mr,0,Math.PI*2); g.fill();
    g.fillStyle = C.sky0;
    g.beginPath(); g.arc(mx+3.4,my-1.6,mr,0,Math.PI*2); g.fill();
    // a couple moon craters
    px(mx-4,my+2,1,1,C.mid); px(mx-6,my-2,1,1,C.mid);

    // ---- background crane silhouette (left) ----
    const hookBob = reduce ? 0 : Math.round(2*Math.sin(t*0.0016));
    (function crane(){
      const baseX=18, topY=14;
      px(baseX,   topY, 2, GROUND_Y-topY, C.far);      // mast
      px(baseX-6, topY, 34, 2, C.far);                 // jib
      px(baseX-6, topY-3, 2, 3, C.far);                // counter tip
      // A-frame feet
      for(let i=0;i<8;i++){ px(baseX-2-i, topY+ i*7, 1,1,C.far); px(baseX+3+i, topY+ i*7, 1,1,C.far); }
      const hookX = baseX+22;
      px(hookX, topY+2, 1, 10+hookBob, C.far);         // cable
      px(hookX-1, topY+12+hookBob, 3, 2, C.mid);       // hook block
    })();

    // ---- ground ----
    px(0,GROUND_Y,VW,VH-GROUND_Y,C.ground);
    px(0,GROUND_Y,VW,1,C.groundLine);
    // sparse ground texture
    for(let x=3;x<VW;x+=11){ px(x, GROUND_Y+4+((x*7)%5), 1,1,C.far); }

    // ---- striped A-frame barrier (center-left) ----
    (function barrier(){
      const bx=40, by=52, bw=30, bh=8;
      // plank with diagonal stripes
      for(let x=0;x<bw;x++) for(let y=0;y<bh;y++){
        const stripe = ((x + y) >> 2) & 1;
        px(bx+x, by+y, 1,1, stripe ? C.light : C.shadow);
      }
      px(bx-1,by-1,bw+2,1,C.dim); px(bx-1,by+bh,bw+2,1,C.dim);     // frame edges
      // legs (A-frame)
      for(let i=0;i<=GROUND_Y-(by+bh);i++){
        px(bx+3 - Math.round(i*0.4), by+bh+i, 1,1,C.mid);
        px(bx+bw-4 + Math.round(i*0.4), by+bh+i, 1,1,C.mid);
      }
      // blinking warning light on top
      const on = reduce ? true : (Math.sin(t*0.006) > 0);
      px(bx+bw/2-1, by-4, 3, 3, on ? C.bright : C.mid);
      if(on){ px(bx+bw/2-2,by-3,1,1,C.dim); px(bx+bw/2+2,by-3,1,1,C.dim); }
    })();

    // ---- traffic cone ----
    (function cone(x0){
      const baseY=GROUND_Y-1;
      for(let r=0;r<13;r++){
        const w = 2 + Math.floor(r*0.8);
        const y = baseY - r;
        px(x0 - w/2, y, w, 1, (r>3 && r<6) ? C.shadow : C.light);   // stripe band
      }
      px(x0-8, baseY+1, 16, 2, C.dim);   // base
    })(76);

    // ---- the sleeping cat ----
    const breathe = reduce ? 0 : (Math.sin(t*0.0022) > 0.3 ? -1 : 0);   // gentle 1px rise
    const catX = 92, catY = GROUND_Y - 15 + breathe;
    // soft shadow
    px(catX+2, GROUND_Y-1, 24, 1, C.shadow);
    sprite(CAT, catX, catY, CATMAP);
    // tail curl
    for(const [tx,ty] of TAIL){ px(catX+tx, catY+ty, 2, 2, C.body); px(catX+tx, catY+ty, 1,1, C.dim); }

    // ---- hard hat resting to the right of the cat ----
    (function hat(x0){
      const y=GROUND_Y-5;
      px(x0-6,y+4,13,1,C.light);            // brim
      px(x0-6,y+3,13,1,C.dim);              // brim shade
      px(x0-4,y+1,9,2,C.light);             // dome
      px(x0-2,y,5,1,C.light);               // dome top
      px(x0-1,y-1,3,1,C.dim);               // crest
    })(134);

    // ---- Zzz rising above the cat's head (head is upper-left) ----
    if(!reduce){
      const cyc = 2600;
      for(let i=0;i<3;i++){
        const p = ((t + i*860) % cyc) / cyc;          // 0..1
        const a = p < .18 ? p/.18 : (p > .7 ? (1-p)/.3 : 1);
        drawZ(catX+9 + p*8, (catY-1) - p*17, 1 + (i>1?1:0), Math.max(0,a));
      }
    } else {
      drawZ(catX+12, catY-6, 2, .9);
    }
  }

  if (reduce){
    draw(1800);
  } else {
    const start = performance.now();
    (function loop(now){ draw(now - start); requestAnimationFrame(loop); })(start);
  }

  // ---- cycling loading messages ----
  const msgs = [
    "laying pixel bricks…",
    "waking up the server…",
    "teaching the cat to code…",
    "compiling good ideas…",
    "the cat said 5 more minutes…"
  ];
  if(!reduce){
    let i=0; const el=document.getElementById('loadmsg');
    setInterval(()=>{ i=(i+1)%msgs.length; el.textContent = msgs[i]; }, 2600);
  }
})();
</script>
